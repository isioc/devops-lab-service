name: lab5

on: 
  push:
    branches: master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: image build
        run: docker build -f ./docker/Dockerfile -t lab4 .

      - name: test run container
        run: |
          docker run -d --name lab4 -p 8000:8000 lab4:latest
          sleep 10
          curl --fail http://localhost:8000 || exit 1
          docker stop lab4
        
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: connecting through ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          script: |
            cd /root/lab5-c/devops-lab-service
            git pull origin master
            docker compose -f docker/docker-compose.yml up -d --build
          
          
